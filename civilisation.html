<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio-Reiche – Civilization Modus</title>
  <link rel="stylesheet" href="civilisation.css" />
</head>
<body>
  <section id="setup" class="setup">
    <div class="setup-card">
      <div class="crest">🏛️</div>
      <h1>Bio-Reiche</h1>
      <p>Single-Player im Civilization-Stil</p>
      <label for="civName">Name deiner Zivilisation</label>
      <input id="civName" maxlength="28" placeholder="z. B. Zellforscher-Reich" />
      <div class="emblems" id="emblems"></div>
      <button id="startGame">Reich gründen</button>
    </div>
  </section>

  <header class="top">
    <div class="brand"><span id="emblem">🧬</span><div><strong id="realm">Bio-Reich</strong><small id="era">Epoche: Grundlagen</small></div></div>
    <div class="stats"><span>📚 Wissen <b id="knowledge">0</b></span><span>🪙 Münzen <b id="coins">6</b></span><span>🔎 <b id="overall">0 / 0</b></span></div>
  </header>

  <main class="layout">
    <aside class="world">
      <h2>Weltkarte</h2>
      <div id="worldMap" class="world-map"></div>
      <button id="academyBtn" class="academy">Akademieprüfung 🎮</button>
      <button id="resetBtn" class="reset">Neues Reich</button>
    </aside>

    <section class="lab">
      <div class="lab-head"><h2>Forschungslabor</h2><p id="hintText">Wähle zwei Karten und entdecke neues Wissen.</p></div>
      <div class="combo">
        <div class="slot" id="slotA">❔<span>1. Wissen</span></div>
        <div class="op">+</div>
        <div class="slot" id="slotB">❔<span>2. Wissen</span></div>
        <div class="op">=</div>
        <div class="slot result" id="slotR">✨<span>Entdeckung</span></div>
      </div>
      <div class="actions"><button id="buyHint">💡 Tipp kaufen (3🪙)</button><button id="showAll">Alle Reiche</button></div>
      <nav id="tabs" class="tabs"></nav>
      <section id="cards" class="cards"></section>
    </section>
  </main>

  <div id="modal" class="modal"><div class="modal-card"><button id="closeModal">×</button><div id="modalIcon" class="modal-icon">🎉</div><h2 id="modalTitle">Entdeckt!</h2><p id="modalText"></p></div></div>

  <div id="academy" class="modal"><div class="modal-card quiz"><button id="closeAcademy">×</button><h2>Akademieprüfung</h2><p id="quizQuestion"></p><div id="quizAnswers" class="answers"></div><p id="quizInfo"></p></div></div>

  <script src="civilisation.js"></script>
</body>
</html>
